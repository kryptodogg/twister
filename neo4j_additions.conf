# Add these lines to neo4j.conf (in <neo4j_install>/conf/)
# Points Neo4j data storage to <project_root>/databases/neo4j/

server.directories.data=C:/path/to/siren/databases/neo4j
# Replace C:/path/to/siren/ with your actual project root path.
# Forward slashes work fine on Windows in neo4j.conf.

# Memory tuning for 64 GB RAM:
server.memory.heap.initial_size=1g
server.memory.heap.max_size=8g
server.memory.pagecache.size=4g
