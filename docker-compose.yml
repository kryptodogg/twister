# Twister v0.5 — Forensic Database Stack
# Windows 11, no WSL2
#
# ── IMPORTANT: Qdrant GPU on Windows 11 without WSL2 ────────────────────────
#
# Docker on Windows 11 without WSL2 cannot pass AMD GPU access into containers.
# The device_requests / driver:amd mechanism requires the ROCm container
# runtime, which only functions inside WSL2 — not in Hyper-V isolated
# Windows containers.
#
# RECOMMENDED: run Qdrant as the native Windows binary with Vulkan GPU support.
#
#   1. Download the latest release from:
#      https://github.com/qdrant/qdrant/releases/latest
#      File: qdrant-x86_64-pc-windows-msvc.zip
#
#   2. Extract to C:\twister\qdrant\
#
#   3. Copy qdrant_config.yaml (included in this repo) to:
#      C:\twister\qdrant\config\config.yaml
#      It sets QDRANT__GPU__ENABLED=true, which the native binary picks up
#      via the Vulkan Compute path on the RX 6700 XT automatically.
#
#   4. Launch:
#      $env:QDRANT__GPU__ENABLED = "true"
#      $env:QDRANT__SERVICE__GRPC_PORT = "6334"
#      .\qdrant.exe
#      (Listens on 6333 HTTP and 6334 gRPC by default.)
#
# ── Neo4j: CPU only, runs cleanly in Docker ─────────────────────────────────
#
# Run:  docker compose up -d
# Stop: docker compose down
# Wipe: docker compose down -v   (then remove .\databases\ manually)

services:

  # ── Neo4j 5.x (CPU) — forensic graph store ────────────────────────────────
  neo4j:
    image: neo4j:latest
    container_name: twister-neo4j
    ports:
      - "7474:7474"   # Browser UI — http://localhost:7474
      - "7687:7687"   # Bolt — neo4rs connects here
    environment:
      NEO4J_AUTH: "neo4j/siren_forensic_2024"
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - ./databases/neo4j/data:/data
      - ./databases/neo4j/logs:/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "siren_forensic_2024", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Qdrant CPU fallback ────────────────────────────────────────────────────
  # Use this ONLY if you cannot run the native Windows binary.
  # This image has no AMD GPU support on Windows without WSL2 — it runs on
  # CPU at reduced throughput.  Enable with:
  #   docker compose --profile cpu-only up -d
  qdrant-cpu-fallback:
    image: qdrant/qdrant:latest
    container_name: twister-qdrant-cpu
    profiles:
      - cpu-only
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"
      QDRANT__GPU__ENABLED: "false"
    volumes:
      - ./databases/qdrant/storage:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
