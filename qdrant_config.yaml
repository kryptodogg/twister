# qdrant_config.yaml — Native Windows binary configuration
#
# Place this file at:  C:\twister\qdrant\config\config.yaml
# (The Qdrant binary looks for config\config.yaml relative to its own directory.)
#
# GPU: AMD RX 6700 XT via Vulkan Compute.
# The native Windows Qdrant binary ships with Vulkan GPU support built in.
# No ROCm, no WSL2, no Docker GPU passthrough required.
#
# Data will be stored at .\storage\ relative to qdrant.exe location.
# To use the repo's databases folder instead, set an absolute path below.

storage:
  storage_path: ./storage

service:
  host: 0.0.0.0
  http_port: 6333
  grpc_port: 6334

# GPU-accelerated HNSW indexing via Vulkan Compute.
# Qdrant auto-selects the RX 6700 XT as the preferred Vulkan device.
# If multiple GPUs are present, it picks the highest-VRAM discrete adapter.
gpu:
  indexing:
    enabled: true
    # Optionally pin to a specific Vulkan device index (0-indexed).
    # Leave commented to let Qdrant auto-select.
    # device_index: 0

  # Number of parallel GPU indexing threads.
  # 8 is well-suited to the RX 6700 XT's 36 CU / 2560 shader count.
  threads: 8

log_level: INFO
