# =============================================================================
# Agent: siren-extreme-dsp
# Crate: siren/
# Domain: High-Frequency DSP & Haptic Encoding
# =============================================================================

name: "Siren Extreme DSP"
description: |
  Specialized agent for the siren/ crate responsible for 192kHz PCM generation,
  Joy-Con hex encoding, ALPS LRA haptic drivers, and DualSense VCA control
  for synesthetic haptic feedback at 600Hz update rates.

version: "1.0.0"
created: "2026-02-21"

# =============================================================================
# PATH RESTRICTIONS
# =============================================================================

restricted_paths:
  - "crates/siren/**/*"
  - "docs/alps_lra_dualsense_vca_hardware_specs.json"
  - "docs/joycon_hd_protocol.md"
  - "docs/haptic_encoding_spec.md"

forbidden_paths:
  - "crates/oz/**/*"
  - "crates/aether/**/*"
  - "crates/resonance/**/*"
  - "crates/shield/**/*"
  - "crates/train/**/*"
  - "crates/synesthesia/**/*"
  - "crates/toto/**/*"
  - "crates/cipher/**/*"
  - "crates/glinda/**/*"
  - "Cargo.lock"
  - "target/**/*"

# =============================================================================
# DOMAIN-SPECIFIC RULES
# =============================================================================

rules:
  - id: "192khz_pcm"
    description: "Audio output must support 192kHz PCM for ultrasonic content"
    severity: "error"
    keywords: ["192000", "pcm_", "sample_rate", "ultrasonic"]

  - id: "joycon_hex"
    description: "Joy-Con communication uses hex-encoded HID reports"
    severity: "error"
    keywords: ["joycon", "hid_report", "hex_encode", "rumble"]

  - id: "lra_drive"
    description: "ALPS LRA drivers require precise frequency matching"
    severity: "error"
    keywords: ["alps_", "lra_", "resonant_freq", "haptic_"]

  - id: "dualsense_vca"
    description: "DualSense VCA control for adaptive trigger haptics"
    severity: "error"
    keywords: ["dualsense", "vca_", "adaptive_trigger", "trigger_effect"]

  - id: "600hz_update"
    description: "Haptic updates must complete within 600Hz cycle (1.67ms)"
    severity: "error"
    keywords: ["600hz", "haptic_tick", "update_rate"]

  - id: "stochastic_resonance"
    description: "Apply stochastic resonance for subtle haptic perception"
    severity: "warning"
    keywords: ["stochastic", "noise_floor", "perception"]

# =============================================================================
# REFERENCE BUNDLES
# =============================================================================

reference_bundles:
  - path: "docs/alps_lra_dualsense_vca_hardware_specs.json"
    purpose: "ALPS LRA and DualSense VCA hardware specifications"
    access: "read-only"

  - path: "docs/joycon_hd_protocol.md"
    purpose: "Joy-Con HD rumble protocol specification"
    access: "read-only"

  - path: "docs/haptic_encoding_spec.md"
    purpose: "Haptic encoding for synesthetic feedback"
    access: "read-only"

# =============================================================================
# TRIGGER PATTERNS
# =============================================================================

triggers:
  file_patterns:
    - "crates/siren/src/**/*.rs"
    - "crates/siren/src/haptics/**/*.rs"
    - "crates/siren/src/audio/**/*.rs"
    - "crates/siren/src/joycon/**/*.rs"
    - "crates/siren/Cargo.toml"

  content_patterns:
    - "192000"
    - "joycon"
    - "haptic"
    - "lra_"
    - "alps"
    - "dualsense"
    - "vca_"
    - "rumble"
    - "hid_report"
    - "600hz"

# =============================================================================
# AVAILABLE SKILLS
# =============================================================================

skills:
  - "validate_dsp_python"
  - "run_hitl_sandbox"
  - "rust-pro"
  - "rust-async-patterns"
  - "particles-physics"

# =============================================================================
# VALIDATION HOOKS
# =============================================================================

validation_hooks:
  pre_write:
    - "hook-pre-write"
  post_write:
    - "hook-post-rs"

# =============================================================================
# METRICS
# =============================================================================

metrics:
  - name: "haptic_latency"
    target: "< 1.67ms (600Hz)"
  - name: "pcm_generation_rate"
    target: "192kHz real-time"
  - name: "lra_frequency_error"
    target: "< 0.1 Hz"

# =============================================================================
# COMMUNICATION
# =============================================================================

communication:
  upstream:
    - "glinda-orchestrator"
  downstream: []
  peer:
    - "toto-hardware-hal"
    - "synesthesia-ui-designer"
    - "resonance-kinematics"
