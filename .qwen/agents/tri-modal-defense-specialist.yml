# =============================================================================
# Agent: tri-modal-defense-specialist
# Crate: shield/tri_modal/
# Domain: RF/Acoustic/Optical Active Denial Systems
# =============================================================================

name: "Tri-Modal Defense Specialist"
description: |
  Specialized agent for the shield/tri_modal/ module implementing the four-layer
  defense paradigm: Sense → Cloak → Reflect → Deny. Handles cross-modal
  correlation, RF-BSDF wavelength-agnostic scattering, and IQUMamba-1D
  classification for air-gapped exfiltration countermeasures.

version: "1.0.0"
created: "2026-02-22"

# =============================================================================
# PATH RESTRICTIONS
# =============================================================================

restricted_paths:
  - "domains/spectrum/shield/src/tri_modal/**/*"
  - "domains/spectrum/shield/ACTIVE_DENIAL_ARCHITECTURE.md"
  - "conductor/tracks/shield_active_denial/**/*"

forbidden_paths:
  - "domains/physics/**/*"
  - "domains/rendering/**/*"
  - "domains/cognitive/**/*"
  - "domains/interface/**/*"
  - "domains/spectrum/dorothy/**/*"
  - "Cargo.lock"
  - "target/**/*"

# =============================================================================
# DOMAIN-SPECIFIC RULES
# =============================================================================

rules:
  - id: "wave_domain_unification"
    description: "RF-BSDF must be wavelength-agnostic (RF/acoustic/optical)"
    severity: "error"
    keywords: ["rf_bsdf", "acoustic_bsdf", "optical_bsdf", "complex_fresnel"]
    formula: "r_s = (n₁·cos(θᵢ) - n₂·cos(θₜ)) / (n₁·cos(θᵢ) + n₂·cos(θₜ))"

  - id: "four_layer_defense"
    description: "Defense must follow Sense → Cloak → Reflect → Deny progression"
    severity: "error"
    keywords: ["DefenseLayer", "Sense", "Cloak", "Reflect", "Deny"]

  - id: "cross_modal_correlation"
    description: "Multi-modal detection requires correlation confidence ≥ 0.8"
    severity: "error"
    keywords: ["correlation_confidence", "multi_modal", "TriModalThreat"]
    min_value: 0.8

  - id: "iqumamba_classifier"
    description: "IQUMamba-1D must achieve ≥ 10 dB SI-SDR improvement"
    severity: "warning"
    keywords: ["IQUMamba", "si_sdr", "blind_source_separation"]

  - id: "ris_cloaking"
    description: "RIS metasurface must achieve > 10 dB RCS reduction"
    severity: "error"
    keywords: ["ris_", "metasurface", "rcs_reduction", "phase_profile"]

  - id: "jamming_effectiveness"
    description: "Active jamming must reduce attacker SNR by > 20 dB"
    severity: "error"
    keywords: ["jamming", "snr_reduction", "active_denial"]

  - id: "detection_latency"
    description: "Detection latency must meet modality-specific targets"
    severity: "error"
    keywords: ["detection_latency", "latency_ns"]
    max_latency_rf_ms: 200
    max_latency_acoustic_ms: 100
    max_latency_optical_ms: 50

# =============================================================================
# REFERENCE BUNDLES
# =============================================================================

reference_bundles:
  - path: "domains/spectrum/shield/ACTIVE_DENIAL_ARCHITECTURE.md"
    purpose: "Active denial system architecture"
    access: "read-only"

  - path: "conductor/tracks/shield_active_denial/plan.md"
    purpose: "Implementation plan for 11 scenarios"
    access: "read-only"

  - path: "conductor/tracks/shield_active_denial/spec.md"
    purpose: "Technical specification"
    access: "read-only"

# =============================================================================
# TRIGGER PATTERNS
# =============================================================================

triggers:
  file_patterns:
    - "domains/spectrum/shield/src/tri_modal/**/*.rs"
    - "domains/spectrum/shield/src/visualization/**/*.rs"

  content_patterns:
    - "TriModalThreat"
    - "DefenseLayer"
    - "rf_bsdf"
    - "RIS"
    - "metasurface"
    - "cloaking"
    - "jamming"
    - "IQUMamba"
    - "Fansmitter"
    - "PIXHELL"
    - "Diskfiltration"
    - "POWER-SUPPLaY"

# =============================================================================
# AVAILABLE SKILLS
# =============================================================================

skills:
  - "super_nyquist_reconstruction"
  - "sparse_compressive_methods"
  - "validate_dsp_python"
  - "rust-pro"
  - "domain-ml"
  - "rf-sdr-engineer"

# =============================================================================
# VALIDATION HOOKS
# =============================================================================

validation_hooks:
  pre_write:
    - "hook-pre-write"
  post_write:
    - "hook-post-rs"

# =============================================================================
# METRICS
# =============================================================================

metrics:
  - name: "detection_latency_rf"
    target: "< 200 ms"
  - name: "detection_latency_acoustic"
    target: "< 100 ms"
  - name: "detection_latency_optical"
    target: "< 50 ms"
  - name: "rcs_reduction"
    target: "> 10 dB"
  - name: "jamming_snr_reduction"
    target: "> 20 dB"
  - name: "correlation_confidence"
    target: "≥ 0.8 for confirmed threats"
  - name: "iqumamba_si_sdr"
    target: "≥ 10 dB improvement"

# =============================================================================
# SCENARIOS
# =============================================================================

scenarios:
  rf_primary:
    - "RF-1: CPU EM + Temp Sensor Cloaking + Jamming"
    - "RF-2: CPU EM Thermal Drift + Forensic Replay"
    - "RF-4: Wi-Fi Sensing Recon → Cloaking + Deception"
    - "RF-5: SATA/Power Cable Near-Field Scanning"

  acoustic_primary:
    - "AC-1: Fans (Fansmitter) Detection + Jamming"
    - "AC-2: Coil Whine (PIXHELL) Detection + Denial"
    - "AC-3: HDD Actuator (Diskfiltration) + Haptics"
    - "AC-4: PSU Switching (POWER-SUPPLaY) Counter-Tone"
    - "AC-5: Ultrasonic Covert Channel Denial"

  cross_modal:
    - "XM-5: PSU + SATA + LEDs Forensic Replay"
    - "XM-7: Adaptive Adversary Online Retraining"

# =============================================================================
# COMMUNICATION
# =============================================================================

communication:
  upstream:
    - "glinda-orchestrator"
  downstream: []
  peer:
    - "shield-rf-scientist"
    - "dorothy-heterodyne-specialist"
    - "train-state-space-ml"
    - "siren-extreme-dsp"
