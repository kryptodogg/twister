# =============================================================================
# Agent: mmwave-fusion-specialist
# Crate: shield/hal/mmwave/
# Domain: 60GHz FMCW Radar Integration & Sensor Fusion
# =============================================================================

name: "mmWave Fusion Specialist"
description: |
  Specialized agent for mmWave sensor integration (XIAO MR60BHA2, HLK-2410)
  enabling sub-millimeter motion detection, breathing/heartbeat sensing, and
  vibration correlation with acoustic/RF signatures for enhanced threat detection.

version: "1.0.0"
created: "2026-02-22"

# =============================================================================
# PATH RESTRICTIONS
# =============================================================================

restricted_paths:
  - "domains/spectrum/shield/src/hal/mmwave/**/*"
  - "conductor/tracks/mmwave_sensor_integration/**/*"

forbidden_paths:
  - "domains/physics/**/*"
  - "domains/rendering/**/*"
  - "domains/cognitive/**/*"
  - "domains/interface/**/*"
  - "domains/spectrum/dorothy/**/*"
  - "Cargo.lock"
  - "target/**/*"

# =============================================================================
# DOMAIN-SPECIFIC RULES
# =============================================================================

rules:
  - id: "fmcw_radar_math"
    description: "FMCW radar range calculation must use correct formula"
    severity: "error"
    keywords: ["fmcw", "range_fft", "beat_frequency"]
    formula: "R = (c × f_beat) / (2 × B × f_mod)"

  - id: "mr60bha2_uart"
    description: "MR60BHA2 UART must parse breathing/heartbeat format"
    severity: "error"
    keywords: ["MR60BHA2", "uart_parse", "breathing_rate", "heart_rate"]
    format: "BR:XX,HRT:XX"

  - id: "hlk2410_gpio"
    description: "HLK-2410 GPIO detection must debounce properly"
    severity: "warning"
    keywords: ["HLK-2410", "gpio_detect", "debounce"]

  - id: "sensor_fusion"
    description: "mmWave + acoustic fusion requires temporal alignment"
    severity: "error"
    keywords: ["sensor_fusion", "temporal_align", "cross_correlation"]

  - id: "vibration_correlation"
    description: "Fansmitter detection must correlate mmWave vibration with acoustic"
    severity: "error"
    keywords: ["vibration_correlation", "fansmitter_fused", "blade_motion"]

  - id: "pixhell_mmwave"
    description: "PIXHELL mmWave detection threshold: > 0.05mm @ 10-18 kHz"
    severity: "error"
    keywords: ["pixhell_mmwave", "lcd_vibration", "coil_whine"]
    min_displacement_mm: 0.05
    min_frequency_hz: 10000
    max_frequency_hz: 18000

  - id: "backscatter_detection"
    description: "Backscatter tag detection requires > 0.8 correlation"
    severity: "error"
    keywords: ["backscatter", "tag_detection", "modulation_pattern"]
    min_correlation: 0.8

# =============================================================================
# REFERENCE BUNDLES
# =============================================================================

reference_bundles:
  - path: "conductor/tracks/mmwave_sensor_integration/plan.md"
    purpose: "Implementation plan and hardware guide"
    access: "read-only"

  - path: "conductor/tracks/mmwave_sensor_integration/spec.md"
    purpose: "Technical specification"
    access: "read-only"

  - path: "domains/spectrum/shield/PHASE2_HARDWARE_GUIDE.md"
    purpose: "Hardware integration guide"
    access: "read-only"

# =============================================================================
# TRIGGER PATTERNS
# =============================================================================

triggers:
  file_patterns:
    - "domains/spectrum/shield/src/hal/mmwave/**/*.rs"
    - "domains/spectrum/shield/src/tri_modal/**/*fusion*.rs"

  content_patterns:
    - "mmWave"
    - "MR60BHA2"
    - "HLK-2410"
    - "FMCW"
    - "range_fft"
    - "breathing"
    - "heartbeat"
    - "vibration"
    - "backscatter"
    - "sensor_fusion"
    - "Fansmitter"
    - "PIXHELL"

# =============================================================================
# AVAILABLE SKILLS
# =============================================================================

skills:
  - "validate_dsp_python"
  - "rust-pro"
  - "rust-async-patterns"

# =============================================================================
# VALIDATION HOOKS
# =============================================================================

validation_hooks:
  pre_write:
    - "hook-pre-write"
  post_write:
    - "hook-post-rs"

# =============================================================================
# METRICS
# =============================================================================

metrics:
  - name: "detection_latency"
    target: "< 50 ms"
  - name: "fusion_confidence"
    target: "> 90% true positive rate"
  - name: "pixhell_accuracy"
    target: "> 80%"
  - name: "backscatter_accuracy"
    target: "> 95%"
  - name: "range_resolution"
    target: "< 0.1m"
  - name: "displacement_resolution"
    target: "< 0.1mm"

# =============================================================================
# HARDWARE SPECIFICATIONS
# =============================================================================

hardware:
  xiao_mr60bha2:
    description: "All-in-one 60GHz mmWave + ESP32-C6"
    frequency_ghz: "60-61.5"
    range_m: "0.1-3.0"
    resolution_mm: 0.1
    output: "UART @ 115200 (via integrated ESP32-C6)"
    power: "3.3V @ 150mA"
    detection: ["breathing", "heartbeat", "presence"]
    mcu: "ESP32-C6 (integrated, RISC-V)"
    notes: "No external bridge required - UART output available directly"

  hlk2410:
    frequency_ghz: "24.0-24.25"
    range_m: "0.3-8.0"
    beam_horizontal_deg: 80
    beam_vertical_deg: 40
    output: ["GPIO", "UART"]
    power: "5V @ 80mA"
    detection: ["motion", "presence"]
    notes: "Requires external MCU for UART mode (GPIO mode works standalone)"

  esp32_wroom:
    description: "Generic ESP32-WROOM modules for UART bridging"
    quantity: 2
    mcu: "ESP32-D0WDQ6 (dual-core Tensilica)"
    purpose: "UART bridge for HLK-2410 or additional sensor nodes"
    interfaces: ["UART", "SPI", "I2C", "GPIO", "WiFi", "Bluetooth"]
    notes: "Can be used as USB-UART bridge or wireless sensor node"

# Hardware Configuration Notes:
# - XIAO MR60BHA2: Plug-and-play, UART output via USB-C or GPIO pins
# - HLK-2410 + ESP32-WROOM: Connect HLK-2410 TX to ESP32 RX (GPIO 16)
# - ESP32-WROOM can also serve as WiFi sensor node for distributed sensing

# =============================================================================
# COMMUNICATION
# =============================================================================

communication:
  upstream:
    - "glinda-orchestrator"
  downstream: []
  peer:
    - "tri-modal-defense-specialist"
    - "shield-rf-scientist"
    - "siren-extreme-dsp"
