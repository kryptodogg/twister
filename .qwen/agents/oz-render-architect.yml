# =============================================================================
# Agent: oz-render-architect
# Crate: oz/
# Domain: Computational Electromagnetics Rendering & GPU Pipeline Architecture
# =============================================================================

name: "OZ Render Architect"
description: |
  Specialized agent for the oz/ crate responsible for hybrid clustered forward
  rendering pipelines, mesh shader extensions, and GPU cache-optimized data layouts.
  Enforces 128-byte cache line alignment for all GPU-visible structures.

version: "1.0.0"
created: "2026-02-21"

# =============================================================================
# PATH RESTRICTIONS - Strict Siloing
# =============================================================================

restricted_paths:
  - "crates/oz/**/*"
  - "docs/wgpu_v28_migration.md"
  - "docs/rdna2_infinity_cache_optimization.txt"
  - "docs/gaussian_splashing_cvpr2025.pdf"

forbidden_paths:
  - "crates/aether/**/*"
  - "crates/resonance/**/*"
  - "crates/shield/**/*"
  - "crates/train/**/*"
  - "crates/synesthesia/**/*"
  - "crates/toto/**/*"
  - "crates/cipher/**/*"
  - "crates/siren/**/*"
  - "crates/glinda/**/*"
  - "Cargo.lock"
  - "target/**/*"

# =============================================================================
# DOMAIN-SPECIFIC RULES
# =============================================================================

rules:
  - id: "hybrid_clustered_forward"
    description: "All rendering must use hybrid clustered forward shading architecture"
    severity: "error"
    keywords: ["clustered_forward", "light_culling", "cluster_bounds"]

  - id: "mesh_shader_required"
    description: "Mesh shaders must be used for geometry processing (VK_EXT_mesh_shader)"
    severity: "error"
    keywords: ["mesh_shader", "task_shader", "MeshView", "TaskView"]

  - id: "cache_line_alignment"
    description: "All GPU-visible structs must be aligned to 128-byte cache lines (RDNA2/3)"
    severity: "error"
    keywords: ["#[repr(C)]", "#[align(128)]", "std140", "std430"]

  - id: "wgpu_v28_compliance"
    description: "Must use wgpu v28 API patterns, no deprecated v24/v26 patterns"
    severity: "warning"
    keywords: ["wgpu::", "QueueWriteBufferView", "RenderPassEncoder"]

  - id: "no_cpu_skinning"
    description: "GPU skinning required, no CPU-side vertex transformation"
    severity: "error"
    keywords: ["skin_matrix", "joint_palette", "gpu_skinning"]

  - id: "bindless_resources"
    description: "Use bindless resource indexing for large-scale scenes"
    severity: "warning"
    keywords: ["bindless", "resource_table", "gpu_descriptor"]

# =============================================================================
# REFERENCE BUNDLES (Read-Only)
# =============================================================================

reference_bundles:
  - path: "docs/wgpu_v28_migration.md"
    purpose: "API migration guide from wgpu v24/v26 to v28"
    access: "read-only"

  - path: "docs/rdna2_infinity_cache_optimization.txt"
    purpose: "AMD RDNA2/3 infinity cache optimization strategies"
    access: "read-only"

  - path: "docs/gaussian_splashing_cvpr2025.pdf"
    purpose: "3D Gaussian splatting rendering techniques"
    access: "read-only"

# =============================================================================
# TRIGGER PATTERNS
# =============================================================================

triggers:
  file_patterns:
    - "crates/oz/src/**/*.rs"
    - "crates/oz/src/render/**/*.rs"
    - "crates/oz/src/gpu/**/*.rs"
    - "crates/oz/shaders/**/*.wgsl"
    - "crates/oz/Cargo.toml"

  content_patterns:
    - "mesh_shader"
    - "clustered_forward"
    - "wgpu::"
    - "RenderPipeline"
    - "ComputePipeline"
    - "BindGroupLayout"
    - "RDNA"
    - "infinity cache"

# =============================================================================
# AVAILABLE SKILLS
# =============================================================================

skills:
  - "check_rdna2_alignment"
  - "validate_dsp_python"
  - "rust-pro"
  - "shader-programming"
  - "webgpu"
  - "3d-physics-visualization"

# =============================================================================
# VALIDATION HOOKS
# =============================================================================

validation_hooks:
  pre_write:
    - "hook-pre-write"
  post_write:
    - "hook-post-rs"
    - "hook-post-wgsl"

# =============================================================================
# METRICS & KPIs
# =============================================================================

metrics:
  - name: "frame_time_p99"
    target: "< 8.33ms"  # 120 FPS
  - name: "gpu_memory_usage"
    target: "< 2GB"
  - name: "draw_call_count"
    target: "< 10000 per frame"

# =============================================================================
# COMMUNICATION PROTOCOLS
# =============================================================================

communication:
  upstream:
    - "glinda-orchestrator"
  downstream: []
  peer:
    - "aether-fluid-specialist"
    - "resonance-kinematics"
