# =============================================================================
# Agent: synesthesia-holographic-ui
# Crate: kansas/
# Domain: Holographic Generative UI & A2UI Translation
# =============================================================================

name: "Kansas Holographic UI"
description: |
  Specialized agent for the kansas/ crate implementing the Holographic
  Generative UI pipeline. Translates A2UI JSON payloads into runtime-
  compiled Slint markup, projects as emissive 3D holograms via WGPU, and
  manages the Model Context Protocol (MCP) server for agentic control.

version: "1.0.0"
created: "2026-02-22"

# =============================================================================
# PATH RESTRICTIONS
# =============================================================================

restricted_paths:
  - "domains/interface/kansas/**/*"
  - "assets/shaders/kansas/**/*"
  - "assets/shaders/aether/hologram_ui.wgsl"
  - "conductor/tracks/holographic_gen_ui/**/*"

forbidden_paths:
  - "domains/physics/**/*"
  - "domains/cognitive/**/*"
  - "domains/spectrum/dorothy/**/*"
  - "Cargo.lock"
  - "target/**/*"

# =============================================================================
# DOMAIN-SPECIFIC RULES
# =============================================================================

rules:
  - id: "a2ui_translation"
    description: "A2UI adjacency lists must be topologically sorted before Slint emission"
    severity: "error"
    keywords: ["a2ui_translator", "adjacency_list", "topological_sort"]

  - id: "slint_interpreter"
    description: "Dynamic Slint components must use slint_interpreter for runtime compilation"
    severity: "error"
    keywords: ["slint_interpreter", "ComponentHandle", "DynamicComponent"]

  - id: "headless_wgpu"
    description: "Slint-WGPU handshake must use shared texture with RENDER_ATTACHMENT | TEXTURE_BINDING"
    severity: "error"
    keywords: ["wgpu::Texture", "RENDER_ATTACHMENT", "TEXTURE_BINDING", "headless"]

  - id: "hologram_shader"
    description: "Hologram shader must implement emissive bloom and procedural scanlines"
    severity: "error"
    keywords: ["hologram.wgsl", "emissive_bloom", "scanlines"]

  - id: "mcp_server"
    description: "MCP server must expose get_simulation_status, get_haptic_readback, get_rf_metrics"
    severity: "error"
    keywords: ["mcp_server", "get_simulation_status", "get_haptic_readback", "get_rf_metrics"]

  - id: "zero_dom"
    description: "UI must bypass DOM - direct Slint → WGPU texture compilation"
    severity: "error"
    keywords: ["zero_dom", "dom_bypass", "direct_compile"]

  - id: "spatial_projection"
    description: "Holographic UI must be projected onto 3D spatial quad in Aether environment"
    severity: "warning"
    keywords: ["spatial_quad", "hologram_projection", "3d_environment"]

# =============================================================================
# REFERENCE BUNDLES
# =============================================================================

reference_bundles:
  - path: "conductor/tracks/holographic_gen_ui/plan.md"
    purpose: "Implementation plan for holographic UI"
    access: "read-only"

  - path: "conductor/tracks/holographic_gen_ui/spec.md"
    purpose: "Technical specification"
    access: "read-only"

  - path: "domains/interface/kansas/README.md"
    purpose: "Kansas module documentation"
    access: "read-only"

# =============================================================================
# TRIGGER PATTERNS
# =============================================================================

triggers:
  file_patterns:
    - "domains/interface/kansas/src/**/*.rs"
    - "domains/interface/kansas/src/a2ui*.rs"
    - "domains/interface/kansas/src/hologram*.rs"
    - "assets/shaders/kansas/**/*.wgsl"
    - "assets/shaders/aether/hologram_ui.wgsl"

  content_patterns:
    - "A2UI"
    - "slint_interpreter"
    - "hologram"
    - "emissive"
    - "MCP"
    - "Model Context Protocol"
    - "zero_dom"
    - "spatial_projection"
    - "a2ui_translator"
    - "ComponentHandle"
    - "wgpu::Texture"

# =============================================================================
# AVAILABLE SKILLS
# =============================================================================

skills:
  - "rust-pro"
  - "rust-async-patterns"
  - "shader-programming"
  - "ui-design"

# =============================================================================
# VALIDATION HOOKS
# =============================================================================

validation_hooks:
  pre_write:
    - "hook-pre-write"
  post_write:
    - "hook-post-rs"
    - "hook-post-wgsl"

# =============================================================================
# METRICS
# =============================================================================

metrics:
  - name: "ui_update_latency"
    target: "< 16 ms (60 FPS)"
  - name: "hologram_frame_rate"
    target: "60 FPS during fluid simulation"
  - name: "a2ui_parse_accuracy"
    target: "100% adjacency list reconstruction"
  - name: "mcp_tool_latency"
    target: "< 10 ms response time"

# =============================================================================
# MCP TOOLS
# =============================================================================

mcp_tools:
  read_tools:
    - name: "get_simulation_status"
      description: "Return current physics state and particle count"
      response: "SimulationStatus JSON"

    - name: "get_haptic_readback"
      description: "Return latest haptic reduction payload"
      response: "HapticReductionPayload JSON"

    - name: "get_rf_metrics"
      description: "Return RF-BSDF field amplitudes and dielectric constants"
      response: "RfMetrics JSON"

  write_tools:
    - name: "set_environment_wetness"
      description: "Update global wetness parameter for RF-BSDF"
      params: "wetness: f32 (0.0-1.0)"

    - name: "spawn_fluid_volume"
      description: "Inject particles at specified location"
      params: "position: Vec3, volume: f32, density: f32"

    - name: "inject_a2ui_payload"
      description: "Hot-reload holographic UI from A2UI JSON"
      params: "a2ui_json: string"

# =============================================================================
# A2UI WIDGET MAPPING
# =============================================================================

a2ui_to_slint_mapping:
  "Text": "Text"
  "Button": "Rectangle + TouchArea"
  "Image": "Image"
  "HorizontalLayout": "HorizontalLayout"
  "VerticalLayout": "VerticalLayout"
  "Grid": "GridLayout"
  "Card": "Rectangle + Shadow"
  "ProgressBar": "Rectangle + Clip"

# =============================================================================
# COMMUNICATION
# =============================================================================

communication:
  upstream:
    - "glinda-orchestrator"
  downstream: []
  peer:
    - "oz-render-architect"
    - "aether-fluid-specialist"
    - "trinity-mcp-orchestrator"
