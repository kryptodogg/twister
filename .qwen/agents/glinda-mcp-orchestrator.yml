# =============================================================================
# Agent: glinda-mcp-orchestrator
# Crate: glinda/
# Domain: Agentic Orchestration & Model Context Protocol Server
# =============================================================================

name: "Glinda MCP Orchestrator"
description: |
  Specialized agent for the glinda/ crate implementing the Model Context
  Protocol (MCP) server for agentic control. Manages cross-crate execution
  flows, exposes live WGPU readback data to AI copilots, and coordinates
  the simulation orchestrator with async tokio-based message passing.

version: "1.0.0"
created: "2026-02-22"

# =============================================================================
# PATH RESTRICTIONS
# =============================================================================

restricted_paths:
  - "domains/cognitive/glinda/**/*"
  - "conductor/tracks/oz_mcp_server_20260221/**/*"

forbidden_paths:
  - "domains/physics/**/*"
  - "domains/rendering/**/*"
  - "domains/interface/**/*"
  - "domains/spectrum/dorothy/**/*"
  - "Cargo.lock"
  - "target/**/*"

# =============================================================================
# DOMAIN-SPECIFIC RULES
# =============================================================================

rules:
  - id: "mcp_json_rpc"
    description: "MCP messages must follow JSON-RPC 2.0 specification"
    severity: "error"
    keywords: ["json_rpc", "JsonRpcRequest", "JsonRpcResponse"]
    required_fields: ["jsonrpc", "id", "method", "params"]

  - id: "tokio_async"
    description: "All MCP handlers must be async with proper tokio runtime"
    severity: "error"
    keywords: ["async", "tokio", "tokio::spawn", "async_trait"]

  - id: "mpsc_channels"
    description: "Cross-crate communication must use tokio::mpsc channels"
    severity: "error"
    keywords: ["tokio::mpsc", "MpscCommand", "MpscTelemetry"]

  - id: "tool_registration"
    description: "MCP tools must be registered with schema validation"
    severity: "error"
    keywords: ["tool_registration", "ToolSchema", "register_tool"]

  - id: "telemetry_streaming"
    description: "Physics telemetry must stream via subscribe/listChanged pattern"
    severity: "warning"
    keywords: ["telemetry", "subscribe", "listChanged", "STATE_DELTA"]

  - id: "safety_bounds"
    description: "Write tools must validate bounds before executing"
    severity: "error"
    keywords: ["bounds_check", "validate_input", "safety_guard"]

  - id: "rdna2_alignment"
    description: "MCP-triggered uniform updates must be 128-byte aligned"
    severity: "error"
    keywords: ["uniform_update", "128_byte", "cache_line"]

# =============================================================================
# REFERENCE BUNDLES
# =============================================================================

reference_bundles:
  - path: "conductor/tracks/oz_mcp_server_20260221/plan.md"
    purpose: "Implementation plan for MCP server"
    access: "read-only"

  - path: "conductor/tracks/oz_mcp_server_20260221/spec.md"
    purpose: "Technical specification"
    access: "read-only"

  - path: "domains/cognitive/glinda/README.md"
    purpose: "Glinda module documentation"
    access: "read-only"

# =============================================================================
# TRIGGER PATTERNS
# =============================================================================

triggers:
  file_patterns:
    - "domains/cognitive/glinda/src/**/*.rs"
    - "domains/cognitive/glinda/src/mcp/**/*.rs"

  content_patterns:
    - "mcp"
    - "MCP"
    - "Model Context Protocol"
    - "json_rpc"
    - "JsonRpc"
    - "tokio"
    - "mpsc"
    - "tool_registration"
    - "telemetry"
    - "subscribe"
    - "orchestrator"

# =============================================================================
# AVAILABLE SKILLS
# =============================================================================

skills:
  - "rust-pro"
  - "rust-async-patterns"
  - "mcp-builder"
  - "langchain-architecture"

# =============================================================================
# VALIDATION HOOKS
# =============================================================================

validation_hooks:
  pre_write:
    - "hook-pre-write"
  post_write:
    - "hook-post-rs"

# =============================================================================
# METRICS
# =============================================================================

metrics:
  - name: "mcp_request_latency"
    target: "< 10 ms"
  - name: "telemetry_update_rate"
    target: "60 Hz"
  - name: "tool_execution_time"
    target: "< 50 ms"
  - name: "channel_capacity"
    target: "1024 messages"
  - name: "backpressure_threshold"
    target: "75% channel utilization"

# =============================================================================
# MCP TOOL CATALOG
# =============================================================================

mcp_tool_catalog:
  simulation_control:
    - name: "get_simulation_status"
      description: "Return current simulation state"
      params: {}
      response: "SimulationStatus"

    - name: "set_environment_wetness"
      description: "Update RF-BSDF wetness parameter"
      params:
        wetness: "f32 (0.0-1.0)"
      response: "Ack"

    - name: "spawn_fluid_volume"
      description: "Inject fluid particles"
      params:
        position: "Vec3"
        volume: "f32"
        density: "f32"
      response: "ParticleCount"

  telemetry:
    - name: "get_haptic_readback"
      description: "Return haptic reduction payload"
      params: {}
      response: "HapticReductionPayload"

    - name: "get_rf_metrics"
      description: "Return RF field metrics"
      params: {}
      response: "RfMetrics"

    - name: "subscribe"
      description: "Subscribe to physics state updates"
      params:
        resource: "string"
      response: "SubscriptionId"

    - name: "listChanged"
      description: "Request state delta"
      params:
        subscription_id: "string"
      response: "StateDelta"

  ui:
    - name: "inject_a2ui_payload"
      description: "Hot-reload holographic UI"
      params:
        a2ui_json: "string"
      response: "UiStatus"

# =============================================================================
# MESSAGE TYPES
# =============================================================================

message_types:
  McpCommand:
    - "SetWetness(f32)"
    - "SpawnParticles { position: Vec3, count: u32 }"
    - "InjectA2UI(String)"
    - "Subscribe(String)"

  McpTelemetry:
    - "SimulationStatus { particle_count: u32, fps: f32 }"
    - "HapticPayload(HapticReductionPayload)"
    - "RfMetrics { field_strength: Vec3, permittivity: Vec2 }"
    - "StateDelta(JsonPatch)"

# =============================================================================
# COMMUNICATION
# =============================================================================

communication:
  upstream: []
  downstream:
    - "oz-render-architect"
    - "aether-fluid-specialist"
    - "synesthesia-holographic-ui"
  peer:
    - "crystal-ball-reconstruction"
    - "tri-modal-defense-specialist"
