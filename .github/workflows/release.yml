name: Release Management

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release'
        required: true
        default: '0.0.0'

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Pre-Release Validation ─────────────────────────────────────────────────
  pre-release:
    name: Pre-Release Validation
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        
    - name: Build release
      run: cargo build --release --verbose
      
    - name: Run tests
      run: cargo test --release --verbose
      
    - name: Build examples
      run: cargo build --release --examples --verbose
      
    - name: Validate examples
      run: |
        # Test that key examples compile and run
        cargo check --example toto --verbose

  # ── Cross-Platform Release Builds ──────────────────────────────────────────
  release-builds:
    name: Cross-Platform Release Builds
    needs: pre-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: ""
            
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}
        
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        
    - name: Build release binary
      run: cargo build --release --target ${{ matrix.target }} --verbose
      
    - name: Build examples
      run: cargo build --release --target ${{ matrix.target }} --examples --verbose
      
    - name: Package release artifacts
      run: |
        mkdir -p release-artifacts
        cp target/${{ matrix.target }}/release/twister${{ matrix.ext }} release-artifacts/ || true
        cp target/${{ matrix.target }}/release/examples/toto${{ matrix.ext }} release-artifacts/toto${{ matrix.ext }} || true
        
    - name: Upload release artifacts
      uses: actions/upload-artifact@v4
      with:
        name: release-${{ matrix.target }}
        path: release-artifacts/

  # ── Documentation Release ──────────────────────────────────────────────────
  docs-release:
    name: Documentation Release
    needs: pre-release
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      
    - name: Generate documentation
      run: cargo doc --release --no-deps --document-private-items --verbose
      
    - name: Upload documentation
      uses: actions/upload-artifact@v4
      with:
        name: documentation-release
        path: target/doc/

  # ── Create GitHub Release ──────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: [release-builds, docs-release]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts/
        
    - name: Create release body
      run: |
        echo "## Release Notes" > release-body.md
        echo "" >> release-body.md
        echo "This release includes:" >> release-body.md
        echo "- Cross-platform binaries for Linux, Windows, and macOS" >> release-body.md
        echo "- Example applications including Toto Core Field Probe" >> release-body.md
        echo "- Hardware support for RTL-SDR and audio processing" >> release-body.md
        echo "- ML inference with Mamba and Chronos models" >> release-body.md
        echo "" >> release-body.md
        echo "## Installation" >> release-body.md
        echo "Download the appropriate binary for your platform from the assets below." >> release-body.md
        
    - name: Create GitHub Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        body_path: release-body.md
        draft: false
        prerelease: false

  # ── Publish to Crates.io ───────────────────────────────────────────────────
  publish-crate:
    name: Publish to Crates.io
    needs: pre-release
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'release'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      
    - name: Publish to crates.io
      run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}